<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>圈圈叉叉</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .tttBoard {
            display: grid;

            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);

            width: fit-content;
            margin: auto;

            background: transparent;
        }

        /* 每一格 */
        .tttCell {
            width: 120px;
            height: 120px;

            background: white;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 40px;
            font-weight: bold;

            cursor: pointer;
        }

        /* 🔥 右邊線（第1、2欄） */
        .tttCell:nth-child(1),
        .tttCell:nth-child(2),
        .tttCell:nth-child(4),
        .tttCell:nth-child(5),
        .tttCell:nth-child(7),
        .tttCell:nth-child(8) {
            border-right: 3px solid #0B5351;
        }

        /* 🔥 下邊線（第1~6格） */
        .tttCell:nth-child(-n+6) {
            border-bottom: 3px solid #0B5351;
        }

        /* hover */
        .tttCell:hover {
            background: #e6f5f3;
        }

        .restartButton {

            width: 140px;
            height: 46px;

            border: none;
            border-radius: 12px;

            background: #1E7A78;
            color: white;

            font-size: 18px;
            font-weight: bold;

            cursor: pointer;

            margin-top: 20px;

            transition: 0.2s;
        }

        .restartButton:hover {
            transform: scale(1.05);
            background: #25908D;
        }
        
        .score {
            margin-top: 15px;
            font-size: 18px;
        }

        .endScreen {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0,0,0,0.6);

            display: flex;
            justify-content: center;
            align-items: center;

            z-index: 999;
        }

        .endBox {
            background: white;

            padding: 30px;
            border-radius: 15px;

            text-align: center;

            width: 250px;
        }

        .hidden {
            display: none;
        }

        .gameContainer{
            width: 100%;
            max-width: 420px;

            display:flex;
            flex-direction:column;
            align-items:center;
        }
    </style>
</head>

<body>

<button class="homeButton" onclick="location.href='index.html'">
🏠
</button>

<div class="gameArea">

    <div class="gameContainer">

        <h1>圈圈叉叉</h1>

        <div class="tttBoard" id="tttBoard"></div>

        <h2 id="status"></h2>

        <div class="score" id="score"></div>

        <button class="restartButton" onclick="resetGame()">
            重新開始
        </button>

    </div>

</div>

<div id="endScreen" class="endScreen hidden">
    <div class="endBox">
        <h1 id="endText">結果</h1>

        <button class="gameButton" onclick="resetGame(); hideEndScreen();">
            重新開始
        </button>
    </div>
</div>

<script>
    let tttBoard = ["", "", "", "", "", "", "", "", ""];
    let gameOver = false;

    let score = {
        player: 0,
        ai: 0,
        draw: 0
    };

    // 讀取紀錄
    if (localStorage.getItem("tttScore")) {
        score = JSON.parse(localStorage.getItem("tttScore"));
    }

    const tttBoardDiv = document.getElementById("tttBoard");
    const statusText = document.getElementById("status");
    const scoreText = document.getElementById("score");

    function drawtttBoard() {
        tttBoardDiv.innerHTML = "";

        tttBoard.forEach((tttCell, index) => {
            const div = document.createElement("div");
            div.className = "tttCell";
            div.innerText = tttCell;

            div.onclick = () => playerMove(index);

            tttBoardDiv.appendChild(div);
        });

        updateScore();
    }

    function playerMove(index) {
        if (tttBoard[index] !== "" || gameOver) return;

        tttBoard[index] = "❌";
        drawtttBoard();

        if (checkWin("❌")) {
            showEndScreen("🎉 你贏了！");
            score.player++;
            saveScore();
            gameOver = true;
            return;
        }

        if (!tttBoard.includes("")) {
            showEndScreen("🤝 平手！");
            score.draw++;
            saveScore();
            gameOver = true;
            return;
        }

        setTimeout(aiMove, 120);
    }

    function aiMove() {
        if (gameOver) return;

        let move = findBestMove();

        tttBoard[move] = "⭕";
        drawtttBoard();

        if (checkWin("⭕")) {
            showEndScreen("😢 你輸了！");
            score.ai++;
            saveScore();
            gameOver = true;
            return;
        }

        if (!tttBoard.includes("")) {
            showEndScreen("🤝 平手！");
            score.draw++;
            saveScore();
            gameOver = true;
            return;
        }
    }

    // 🤖 AI核心（防守 + 進攻）
    function findBestMove() {

        // 1. 先找自己能贏的位置
        let winMove = findWinningMove("⭕");
        if (winMove !== -1) return winMove;

        // 2. 再找阻止玩家的位置
        let blockMove = findWinningMove("❌");
        if (blockMove !== -1) return blockMove;

        // 3. 中心優先
        if (tttBoard[4] === "") return 4;

        // 4. 隨機
        let empty = tttBoard
            .map((v, i) => v === "" ? i : null)
            .filter(v => v !== null);

        return empty[Math.floor(Math.random() * empty.length)];
    }

    function findWinningMove(player) {
        const winPatterns = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        for (let pattern of winPatterns) {
            let values = pattern.map(i => tttBoard[i]);

            let countPlayer = values.filter(v => v === player).length;
            let countEmpty = values.filter(v => v === "").length;

            if (countPlayer === 2 && countEmpty === 1) {
                return pattern.find(i => tttBoard[i] === "");
            }
        }

        return -1;
    }

    function checkWin(player) {
        const winPatterns = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        return winPatterns.some(pattern =>
            pattern.every(i => tttBoard[i] === player)
        );
    }

    function saveScore() {
        localStorage.setItem("tttScore", JSON.stringify(score));
        updateScore();
    }

    function updateScore() {
        scoreText.innerHTML =
            `你：${score.player} ｜ 電腦：${score.ai} ｜ 平手：${score.draw}`;
    }

    function showEndScreen(text) {
        document.getElementById("endText").innerText = text;
        document.getElementById("endScreen").classList.remove("hidden");
    }

    function hideEndScreen() {
        document.getElementById("endScreen").classList.add("hidden");
    }

    function resetGame() {
        tttBoard = ["", "", "", "", "", "", "", "", ""];
        gameOver = false;
        statusText.innerText = "";
        drawtttBoard();
    }

    drawtttBoard();
</script>

</body>
</html>
