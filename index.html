<!DOCTYPE html>
<html>

<head>

<body>

<div class="menuContainer" id="numberMenu">

    <button class="gameButton"
        onclick="location.href='2A3B.html'">

        onclick="location.href='tweFi.html'">

    </button>

    <button class="gameButton disabledButton">
        開發中
    </button>

</div>

<!-- 再下一個分類 -->

<button class="categoryHeader"
    onclick="toggleMenu('blockMenu')">

    ▼ 方塊

</button>

<div class="menuContainer" id="blockMenu">

    <button class="gameButton disabledButton">
        開發中
    </button>

    </button>

</div>

<!-- 再下一個分類 -->

    </button>

    </button>

</div>

    onclick="toggleMenu('otherMenu')">

    ▼ 其他

</button>

<div class="menuContainer" id="otherMenu">

    <button class="gameButton"
        onclick="location.href='OOXX.html'">

        圈圈叉叉

    </button>

    <button class="gameButton"
        onclick="location.href='Sheepp.html'">
        
        瑪了個莉
        
    </button>
    
    <button class="gameButton"
        onclick="location.href='mine.html'">
        
        踩地雷
        
    </button>
    
    <button class="gameButton disabledButton">
        開發中
    </button>

</div>

<script>

function toggleMenu(menuId){

    const menu = document.getElementById(menuId);

    menu.classList.toggle("show");

}

</script>
</body>
</html>
