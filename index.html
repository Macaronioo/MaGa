<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>莉莉摳摳</title>

<link rel="stylesheet"
href="assets/css/base.css">

<link rel="stylesheet"
href="assets/css/theme.css">

<link rel="stylesheet"
href="assets/css/ui.css">

<link rel="stylesheet"
href="main/index.css">

</head>

<body>
<!-- ☰ 左上選單 -->

<button class="menuBtn"
    onclick="toggleSideMenu()">

    ☰

</button>

<!-- 🌑 背景 -->

<div class="menuOverlay"
    id="menuOverlay"
    onclick="closeMenu()">

</div>

<!-- 📦 側邊欄 -->

<div class="sideMenu"
    id="sideMenu">

    <button class="menuItem"
        onclick="showLocalData()">

        📊 本地紀錄

    </button>

    <button class="menuItem"
        onclick="clearAllData()">

        🗑 清除全部紀錄

    </button>

</div>
     
<h1>莉莉摳摳</h1>

<!-- =========================
     🔢 數字
========================= -->

<section class="categorySection">

    <button class="categoryHeader"
    onclick="toggleMenu('numberMenu')">

        ▼ 數字

    </button>

    <div class="menuContainer"
    id="numberMenu">

        <button class="gameButton"
        onclick="location.href='game/2A3B/index.html'">

            2A3B

        </button>

        <button class="gameButton"
        onclick="location.href='game/tweFi/index.html'">

            1-25

        </button>

        <button class="gameButton"
        onclick="location.href='game/2048/index.html'">

            2048

        </button>

        <button class="gameButton"
        onclick="location.href='make10.html'">

            Make10

        </button>

        <button class="gameButton disabledButton">

            開發中

        </button>

    </div>

</section>

<!-- =========================
     🧩 方塊
========================= -->

<section class="categorySection">

    <button class="categoryHeader"
    onclick="toggleMenu('blockMenu')">

        ▼ 方塊

    </button>

    <div class="menuContainer"
    id="blockMenu">

        <button class="gameButton disabledButton">

            開發中

        </button>

    </div>

</section>

<!-- =========================
     🃏 撲克
========================= -->

<section class="categorySection">

    <button class="categoryHeader"
    onclick="toggleMenu('pokerMenu')">

        ▼ 撲克

    </button>

    <div class="menuContainer"
    id="pokerMenu">

        <button class="gameButton disabledButton">

            開發中

        </button>

    </div>

</section>

<!-- =========================
     🎮 其他
========================= -->

<section class="categorySection">

    <button class="categoryHeader"
    onclick="toggleMenu('otherMenu')">

        ▼ 其他

    </button>

    <div class="menuContainer"
    id="otherMenu">

        <button class="gameButton"
        onclick="location.href='game/tictoetic/index.html'">

            OOXX

        </button>

        <button class="gameButton"
        onclick="location.href='Sheepp.html'">

            瑪莉

        </button>

        <button class="gameButton"
        onclick="location.href='mine.html'">

            地雷

        </button>

        <button class="gameButton disabledButton">

            開發中

        </button>

    </div>

</section>

<script src="main/index.js"></script>

</body>

</html>
