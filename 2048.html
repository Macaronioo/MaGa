<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>2048</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* =========================
   🎮 2048 容器
========================= */

.gameContainer{
    width: 100%;
    max-width: 500px;

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* =========================
   🎮 上方資訊
========================= */

.topInfo{
    width: 100%;
    display:flex;
    justify-content:space-between;

    margin-top: 20px;
    padding: 0 10px;

    font-weight: bold;
}

/* =========================
   🎮 棋盤
========================= */

.g2048Board {
    display: grid;

    width: 95vw;
    max-width: 500px;

    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);

    aspect-ratio: 1 / 1;

    gap: 10px;

    margin: 20px auto;
    padding: 10px;

    background: #0B5351;
    border-radius: 12px;

    touch-action: none;
}

/* 格子 */
.g2048Cell {
    width: 100%;
    height: 100%;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: clamp(16px, 6vw, 40px);
    font-weight: bold;

    border-radius: 10px;

    background: #DCEFED;
    color: #0B5351;

    user-select: none;

    overflow: hidden;
}

/* 分數色 */
.g2048Cell[data-v="2"]{background:#E6F5F3;}
.g2048Cell[data-v="4"]{background:#CDEEE9;}
.g2048Cell[data-v="8"]{background:#7FD6CD;color:white;}
.g2048Cell[data-v="16"]{background:#57C5B6;color:white;}
.g2048Cell[data-v="32"]{background:#1E7A78;color:white;}
.g2048Cell[data-v="64"]{background:#146865;color:white;}
.g2048Cell[data-v="128"]{background:#0B5351;color:white;}
.g2048Cell[data-v="256"]{background:#063B3A;color:white;}
.g2048Cell[data-v="512"]{background:#033C3A;color:white;}
.g2048Cell[data-v="1024"]{background:#000;color:#FFD700;}
.g2048Cell[data-v="2048"]{background:#000;color:#FFD700;}

/* =========================
   🎮 Game Over
========================= */

.gameOverMask{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.6);

    display:none;
    justify-content:center;
    align-items:center;
}

.gameOverBox{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

/* =========================
   🎮 按鈕
========================= */

.restartButton{

    width: 140px;
    height: 45px;

    border:none;
    border-radius:12px;

    background:#1E7A78;
    color:white;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    margin-top: 10px;
}

.restartButton:hover{
    background:#25908D;
}

/* =========================
   📱 手機
========================= */

@media (max-width:600px){

    .g2048Board{
        grid-template-columns: repeat(4, 20vw);
        grid-template-rows: repeat(4, 20vw);
    }

    .g2048Cell{
        font-size: 5vw;
    }
}

</style>

</head>

<body>

<!-- 🏠 左上 -->
<button class="homeButton leftBtn" onclick="location.href='index.html'">🏠</button>

<!-- 🔄 右上 -->
<button class="homeButton rightBtn" onclick="init()">🔄</button>

<div class="gameContainer">

    <h1>2048</h1>

    <!-- 📊 分數 -->
    <div class="topInfo">
        <div>分數：<span id="score">0</span></div>
        <div>最高：<span id="best">0</span></div>
    </div>

    <!-- 🎮 棋盤 -->
    <div id="board" class="g2048Board"></div>

</div>

<!-- 💀 Game Over -->
<div class="gameOverMask" id="overMask">
    <div class="gameOverBox">
        <h2>Game Over</h2>
        <button class="restartButton" onclick="init(); closeOver();">
            重新開始
        </button>
    </div>
</div>

<script>

let board;
let score = 0;
let best = localStorage.getItem("best2048") || 0;

const boardEl = document.getElementById("board");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const overMask = document.getElementById("overMask");

bestEl.innerText = best;

function init(){

    board = Array(4).fill().map(()=>Array(4).fill(0));
    score = 0;

    add();
    add();

    render();
}

/* =========================
   新增方塊
========================= */

function add(){
    let empty = [];

    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){
            if(board[r][c] === 0) empty.push({r,c});
        }
    }

    if(empty.length === 0) return;

    let {r,c} = empty[Math.floor(Math.random()*empty.length)];
    board[r][c] = Math.random() < 0.9 ? 2 : 4;
}

/* =========================
   畫面
========================= */

function render(){

    boardEl.innerHTML = "";

    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){

            let div = document.createElement("div");
            div.className = "g2048Cell";

            let v = board[r][c];

            if(v !== 0){
               div.innerText = v;
               div.dataset.v = v;

               div.style.lineHeight = "1";

               if(v >= 1000){
                  div.style.fontSize = "0.9em";
               }
               else if(v >= 100){
                  div.style.fontSize = "1.2em";
               }
               else{
                  div.style.fontSize = "1.8em";
               }
            }
         

            boardEl.appendChild(div);
        }
    }

    scoreEl.innerText = score;

    if(score > best){
        best = score;
        localStorage.setItem("best2048", best);
        bestEl.innerText = best;
    }
}

/* =========================
   合併邏輯
========================= */

function slide(row){

    row = row.filter(v=>v!==0);

    for(let i=0;i<row.length-1;i++){
        if(row[i] === row[i+1]){
            row[i] *= 2;
            score += row[i];
            row[i+1] = 0;
        }
    }

    row = row.filter(v=>v!==0);

    while(row.length < 4){
        row.push(0);
    }

    return row;
}

function moveLeft(){
    for(let r=0;r<4;r++){
        board[r] = slide(board[r]);
    }
}

function moveRight(){
    for(let r=0;r<4;r++){
        board[r] = slide(board[r].reverse()).reverse();
    }
}

function moveUp(){
    for(let c=0;c<4;c++){
        let col = [];
        for(let r=0;r<4;r++) col.push(board[r][c]);

        col = slide(col);

        for(let r=0;r<4;r++) board[r][c] = col[r];
    }
}

function moveDown(){
    for(let c=0;c<4;c++){
        let col = [];
        for(let r=0;r<4;r++) col.push(board[r][c]);

        col = slide(col.reverse()).reverse();

        for(let r=0;r<4;r++) board[r][c] = col[r];
    }
}

/* =========================
   判斷 Game Over
========================= */

function isGameOver(){

    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){
            if(board[r][c] === 0) return false;
        }
    }

    for(let r=0;r<4;r++){
        for(let c=0;c<3;c++){
            if(board[r][c] === board[r][c+1]) return false;
        }
    }

    for(let c=0;c<4;c++){
        for(let r=0;r<3;r++){
            if(board[r][c] === board[r+1][c]) return false;
        }
    }

    return true;
}

/* =========================
   鍵盤
========================= */

document.addEventListener("keydown", e=>{

    let before = JSON.stringify(board);

    if(e.key==="ArrowLeft") moveLeft();
    if(e.key==="ArrowRight") moveRight();
    if(e.key==="ArrowUp") moveUp();
    if(e.key==="ArrowDown") moveDown();

    if(JSON.stringify(board) !== before){
        add();
        render();
    }

    if(isGameOver()){
        overMask.style.display="flex";
    }
});

/* =========================
   手機滑動
========================= */

let startX, startY;

document.addEventListener("touchstart", e=>{

    e.preventDefault();

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

}, { passive:false });

document.addEventListener("touchmove", e=>{

    e.preventDefault();

}, { passive:false });

document.addEventListener("touchend", e=>{

    e.preventDefault();

    let dx = e.changedTouches[0].clientX - startX;
    let dy = e.changedTouches[0].clientY - startY;

    let before = JSON.stringify(board);

    if(Math.abs(dx) > Math.abs(dy)){
        if(dx > 0) moveRight();
        else moveLeft();
    }else{
        if(dy > 0) moveDown();
        else moveUp();
    }

    if(JSON.stringify(board) !== before){
        add();
        render();
    }

    if(isGameOver()){
        overMask.style.display="flex";
    }

}, { passive:false });

/* =========================
   控制
========================= */

function closeOver(){
    overMask.style.display="none";
}

init();

</script>

</body>
</html>
