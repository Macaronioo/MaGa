<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Flow 7 Game</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* ===== 基礎 ===== */
body{
    margin:0;
    background:#DAEEE1;
    font-family:Arial;
    touch-action:none;
}

/* ===== 容器 ===== */
.gameContainer{
    width:100%;
    max-width:500px;
    margin:0 auto;
    text-align:center;
}

/* ===== 流動數列 ===== */
.board{
    width:95vw;
    max-width:420px;

    display:flex;
    flex-wrap:wrap;

    gap:8px;
    margin:20px auto;
}

/* ===== 格子 ===== */
.cell{
    width: calc((95vw - 40px) / 7);
    max-width:50px;
    aspect-ratio:1/1;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#1E7A78;
    color:white;
    font-weight:bold;
    border-radius:10px;

    user-select:none;
}

/* 選取 */
.cell.selected{
    background:#FFD166;
    color:#0B5351;
}

/* ===== 按鈕（沿用你風格） ===== */
.homeButton,
.actionButton{
    position:fixed;
    top:15px;

    width:52px;
    height:52px;

    border:none;
    border-radius:50%;

    background:#0B5351;
    color:white;
    font-size:20px;
}

/* 左上 */
.leftBtn{ left:15px; }

/* 右上 */
.rightBtn{ right:15px; }

.plusBtn{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);

    width:60px;
    height:60px;
    border-radius:50%;
    border:none;

    background:#1E7A78;
    color:white;
    font-size:30px;
}

</style>

</head>

<body>

<!-- 🏠 -->
<button class="homeButton leftBtn" onclick="location.href='index.html'">🏠</button>

<!-- 🔄 -->
<button class="homeButton rightBtn" onclick="init()">🔄</button>

<!-- ➕ -->
<button class="plusBtn" onclick="addNumber()">+</button>

<div class="gameContainer">

    <h1>FLOW 7</h1>

    <div id="board" class="board"></div>

</div>

<script>

let board = [];
let selected = [];

const boardEl = document.getElementById("board");

/* ===== 初始化 ===== */
function init(){

    board = [];

    for(let i=0;i<7;i++){
        board.push(rand());
    }

    selected = [];
    render();
}

/* ===== 隨機數 ===== */
function rand(){
    return Math.floor(Math.random()*9)+1;
}

/* ===== render ===== */
function render(){

    boardEl.innerHTML = "";

    board.forEach((v,i)=>{

        let div = document.createElement("div");
        div.className = "cell";

        div.innerText = v;

        if(selected.includes(i)){
            div.classList.add("selected");
        }

        div.onclick = ()=>clickCell(i);

        boardEl.appendChild(div);
    });
}

/* ===== 點擊消除 ===== */
function clickCell(i){

    if(selected.includes(i)) return;

    selected.push(i);

    if(selected.length === 2){

        let a = selected[0];
        let b = selected[1];

        // 👉 消除條件（相同）
        if(board[a] === board[b]){
            board[a] = null;
            board[b] = null;
        }

        selected = [];
        compact();
        render();
    }
}

/* ===== 壓縮重排 ===== */
function compact(){

    board = board.filter(v => v !== null);
}

/* ===== + 按鈕 ===== */
function addNumber(){

    // 👉 從現有數字抽一個
    let pool = board.length ? board : [rand()];
    let newNum = pool[Math.floor(Math.random()*pool.length)];

    board.push(newNum);

    render();
}

init();

</script>

</body>
</html>
