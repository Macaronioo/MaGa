<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2A3B</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* ===== 基本 ===== */

body{
    margin:0;
    font-family:Arial;
}

h1{
    text-align:center;
    margin:10px 0;
}

/* ===== 輸入顯示 ===== */

.inputBox{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:10px;
}

.box{
    width:13vw;
    height:13vw;
    max-width:55px;
    max-height:55px;

    background:white;
    border-radius:10px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:6vw;
    font-weight:bold;

    border:2px solid #0B5351;
}

/* ===== 鍵盤 ===== */

.keyboard{
    max-width:500px;
    margin:auto;

    display:flex;
    flex-direction:column;
    gap:10px;

    padding:10px;
}

/* 每一排 */
.row{
    display:flex;
    justify-content:space-between;
    gap:10px;
}

/* 按鍵 */
.key{
    flex:1;
    height:12vw;
    max-height:55px;

    border:none;
    border-radius:10px;

    background:#1E7A78;
    color:white;

    font-size:5vw;
    font-weight:bold;

    cursor:pointer;
}

.key:active{
    transform:scale(0.95);
}

/* 特殊鍵（清除/確認） */
.special{
    background:#0B5351;
}

/* ===== 紀錄 ===== */

.log{
    margin-top:10px;
    padding:10px;

    max-height:45vh;
    overflow-y:auto;
}

.card{
    background:white;
    margin:6px 0;
    padding:8px;

    border-radius:10px;
    font-size:16px;

    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<button class="homeButton leftBtn"
    onclick="location.href='index.html'">

    🏠

</button>

<button class="homeButton rightBtn"
    onclick="startGame()">

    🔄

</button>

<h1>2A3B</h1>

<!-- 輸入 -->
<div class="inputBox">
    <div class="box" id="b0"></div>
    <div class="box" id="b1"></div>
    <div class="box" id="b2"></div>
    <div class="box" id="b3"></div>
</div>

<h2 id="result" style="text-align:center;"></h2>

<!-- 鍵盤 -->
<div class="keyboard">

    <!-- 第一排 -->
    <div class="row">
        <button class="key" onclick="press('1')">1</button>
        <button class="key" onclick="press('2')">2</button>
        <button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button>
        <button class="key" onclick="press('5')">5</button>
        <button class="key special" onclick="clearInput()">⌫</button>
    </div>

    <!-- 第二排 -->
    <div class="row">
        <button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button>
        <button class="key" onclick="press('8')">8</button>
        <button class="key" onclick="press('9')">9</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key special" onclick="checkGuess()">確認</button>
    </div>

</div>

<!-- 紀錄 -->
<div class="log" id="log"></div>

<script>

let answer = generate();
let input = [];
let tries = 0;

console.log("答案:", answer);

function generate(){
    let arr=[];
    while(arr.length<4){
        let n=Math.floor(Math.random()*10).toString();
        if(!arr.includes(n)) arr.push(n);
    }
    return arr;
}

function press(num){
    if(input.length>=4) return;
    if(input.includes(num)) return alert("不能重複");

    input.push(num);
    render();
}

function clearInput(){
    input=[];
    render();
}

function render(){
    for(let i=0;i<4;i++){
        document.getElementById("b"+i).innerText=input[i]||"";
    }
}

function checkGuess(){

    if(input.length<4){
        alert("請輸入4個數字");
        return;
    }

    tries++;

    let A=0,B=0;

    for(let i=0;i<4;i++){
        if(input[i]===answer[i]) A++;
        else if(answer.includes(input[i])) B++;
    }

    document.getElementById("result").innerText=`${A}A${B}B`;

    let log=document.getElementById("log");

    let card=document.createElement("div");
    card.className="card";
    card.innerText=`第${tries}次：${input.join("")} → ${A}A${B}B`;

    log.appendChild(card);

    if(A===4){
        document.getElementById("result").innerText="🎉 通關！";
    }

    input=[];
    render();
}

</script>

</body>

</html>
