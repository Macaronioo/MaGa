<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>瑪了個莉</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* =========================
   🎮 遊戲區
========================= */

.gameWrapper {

    width: 100%;
    max-width: 900px;

    margin: auto;

    padding: 10px;

    box-sizing: border-box;
}

.board {

    position: relative;

    width: 100%;
    height: 60vh;   /* 原本 70vh → 縮小 */

    min-height: 380px; /* 原本 500px → 縮小 */

    background: rgba(255,255,255,0.3);

    border-radius: 20px;

    overflow: hidden;
}

/* =========================
   🧩 方塊
========================= */

.tile {

    position: absolute;

    width: 62px;
    height: 62px;

    border-radius: 15px;

    background: white;

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: 32px;

    cursor: pointer;

    user-select: none;

    box-shadow: 0 4px 10px rgba(0,0,0,0.2);

    transition: 0.2s;
}

.tile:hover {

    transform: scale(1.05);
}

.tile.blocked {

    filter: brightness(0.6);

    cursor: not-allowed;
}

/* =========================
   📦 暫存區
========================= */

.slotArea {

    width: 100%;

    min-height: 60px;   /* ↓變小 */

    max-height: 90px;   /* 限制高度 */

    margin-top: 20px;

    background: rgba(255,255,255,0.4);

    border-radius: 20px;

    display: flex;

    gap: 6px;

    padding: 6px;

    box-sizing: border-box;

    overflow-x: auto;
}

.slotTile {

    width: 65px;
    height: 65px;

    border-radius: 12px;

    background: white;

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: 34px;

    flex-shrink: 0;

    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

/* =========================
   📝 訊息
========================= */

.message {

    text-align: center;

    margin-top: 15px;

    font-size: 28px;

    font-weight: bold;
}

/* =========================
   📱 手機版
========================= */

@media (max-width: 600px) {

    .tile {

        width: 48px;
        height: 48px;
        
        font-size: 26px;
    }

    .slotTile {

        width: 42px;
        height: 42px;
        
        font-size: 24px;
    }

    .board {

        height: 65vh;
    }

    .leftBtn{
        left: 10px;
    }

    .rightBtn{
        right: 10px;
    }

    .homeButton{
        width: 44px;
        height: 44px;
        font-size: 20px;
    }

}

</style>

</head>

<body>

<button class="homeButton leftBtn"
    onclick="location.href='index.html'">
    🏠
</button>

<button class="homeButton rightBtn"
    onclick="startGame()">
    🔄
</button>

<h1>瑪了個莉</h1>

<div class="gameWrapper">

    <div class="board"
        id="board">

    </div>

    <div class="slotArea"
        id="slotArea">

    </div>

    <div class="message" id="message"></div>

    <button id="retryBtn"
        onclick="startGame()"
        style="
            display:none;
            margin:20px auto;
            padding:12px 20px;
            font-size:22px;
            border:none;
            border-radius:12px;
            background:#0B5351;
            color:white;
            cursor:pointer;
        ">
        🔄 再玩一次
    </button>

</div>

<script>

/* =========================
   🧠 遊戲資料
========================= */

const board =
    document.getElementById("board");

const slotArea =
    document.getElementById("slotArea");

const message =
    document.getElementById("message");

const icons = [

    "🐱","🐶","🐼","🐸","🐵","🐰",
    "🍎","🍋","🍇","🍓","🥝","🍔",
    "⚽","🏀","🎮","🎲","🎯","🚗",
    "🦄","🐤","🌸","🍉"

];

let tiles = [];

let slot = [];

/* =========================
   🔀 洗牌
========================= */

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j =
            Math.floor(Math.random()*(i+1));

        [array[i],array[j]]
            =
        [array[j],array[i]];

    }

}

/* =========================
   🎮 開始遊戲
========================= */

function startGame(){
    gameOver = false;

    document.getElementById("retryBtn")
        .style.display = "none";

    board.innerHTML = "";

    slotArea.innerHTML = "";

    message.innerHTML = "";

    tiles = [];

    slot = [];

    generateTiles();

    renderBoard();

}

/* =========================
   🧩 生成方塊
========================= */

function generateTiles(){

    const total = 60;

    let pool = [];

    while(pool.length < total){

        const icon =
            icons[
                Math.floor(
                    Math.random()*icons.length
                )
            ];

        pool.push(icon,icon,icon);

    }

    pool = pool.slice(0,total);

    shuffle(pool);

    for(let i=0;i<total;i++){

        const layer =
            Math.floor(Math.random()*5);

        const x =
            Math.random()*
            (board.clientWidth - 80);

        const y =
            Math.random()*
            (board.clientHeight - 80);

        tiles.push({

            id:i,

            icon:pool[i],

            x,

            y,

            layer,

            removed:false

        });

    }

}

/* =========================
   🚫 是否被遮擋
========================= */

function isBlocked(tile){

    for(const other of tiles){

        if(other.removed)
            continue;

        if(other.id === tile.id)
            continue;

        if(other.layer <= tile.layer)
            continue;

        const overlapX =
            Math.abs(other.x - tile.x) < 45;

        const overlapY =
            Math.abs(other.y - tile.y) < 45;

        if(overlapX && overlapY){

            return true;

        }

    }

    return false;

}

/* =========================
   🎨 渲染遊戲區
========================= */

function renderBoard(){

    board.innerHTML = "";

    const sorted =
        [...tiles].sort(
            (a,b)=>a.layer-b.layer
        );

    sorted.forEach(tile=>{

        if(tile.removed)
            return;

        const div =
            document.createElement("div");

        div.className = "tile";

        if(isBlocked(tile)){

            div.classList.add("blocked");

        }

        div.style.left =
            tile.x + "px";

        div.style.top =
            tile.y + "px";

        div.style.zIndex =
            tile.layer;

        div.innerHTML =
            tile.icon;

        div.onclick =
            ()=>selectTile(tile);

        board.appendChild(div);

    });

}

/* =========================
   👆 點擊方塊
========================= */

function selectTile(tile){
    if(gameOver) return;

    if(tile.removed)
        return;

    if(isBlocked(tile))
        return;

    tile.removed = true;

    slot.push(tile.icon);

    renderSlot();

    checkMatch();

    renderBoard();

    checkWin();

    checkLose();

}

/* =========================
   📦 渲染暫存區
========================= */

function renderSlot(){

    slotArea.innerHTML = "";

    slot.forEach(icon=>{

        const div =
            document.createElement("div");

        div.className =
            "slotTile";

        div.innerHTML =
            icon;

        slotArea.appendChild(div);

    });

}

/* =========================
   ✨ 三消
========================= */

function checkMatch(){

    let count = {};

    slot.forEach(icon=>{

        count[icon] =
            (count[icon] || 0) + 1;

    });

    for(const icon in count){

        if(count[icon] >= 3){

            let removed = 0;

            slot =
                slot.filter(i=>{

                    if(
                        i === icon
                        &&
                        removed < 3
                    ){

                        removed++;

                        return false;

                    }

                    return true;

                });

            renderSlot();

        }

    }

}

/* =========================
   🏆 勝利
========================= */

function checkWin(){

    const remain =
        tiles.filter(t=>!t.removed);

    if(remain.length === 0){

        message.innerHTML =
            "🎉 過關！";

        setTimeout(()=>{

            startGame();

        },1500);

    }

}

/* =========================
   💀 失敗
========================= */

let gameOver = false;

function checkLose(){

    if(slot.length >= 7 && !gameOver){

        gameOver = true;

        message.innerHTML =
            "💀 失敗";

        document.getElementById("retryBtn")
            .style.display = "block";

    }

}

/* =========================
   🚀 啟動
========================= */

startGame();

</script>

</body>

</html>
